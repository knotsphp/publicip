name: Tests

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        php: [ 8.3, 8.4 ]

    name: Test with php ${{ matrix.php }} on ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup PHP
        uses: shivammathur/setup-php@f3e473d116dcccaddc5834248c87452386958240 # v2.37.2
        with:
          php-version: ${{ matrix.php }}
          tools: composer:v2
      #          coverage: xdebug

      - name: Get composer cache directory (Unix based)
        if: runner.os != 'Windows'
        id: composer-cache-unix
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Get composer cache directory (Windows)
        if: runner.os == 'Windows'
        id: composer-cache-windows
        run: |
          $dir = composer config cache-files-dir
          echo "dir=$dir" >> $env:GITHUB_OUTPUT

      - name: Cache dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ steps.composer-cache-unix.outputs.dir || steps.composer-cache-windows.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Dependencies
        run: composer update --no-interaction --prefer-dist

      - name: Run tests
        run: ./vendor/bin/pest

      - name: Test cpx execution
        if: matrix.os == 'ubuntu-latest' && matrix.php == '8.4'
        run: |
          composer global require cpx/cpx --no-interaction --prefer-dist
          export PATH="$COMPOSER_HOME/vendor/bin:$PATH"
          cpx knotsphp/publicip:dev-${GITHUB_HEAD_REF:-${GITHUB_REF_NAME}} --help
